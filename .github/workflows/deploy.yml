name: Deploy to EC2

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # - name: Checkout code
    #   uses: actions/checkout@v3

    - name: Set up SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_KEY }}" > ~/.ssh/public_key.pem
        chmod 400 ~/.ssh/public_key.pem
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Remove old code in EC2
      run: |
        ssh -i "~/.ssh/public_key.pem" ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
          cd ~/deploy
          rm -rf Taro
        EOF

    - name: Clone code to EC2
      run: |
        ssh -i "~/.ssh/public_key.pem" ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
          cd ~/deploy
          git clone https://github.com/ZhishenZ/Taro.git
        EOF

    - name: Start taro in EC2
      run: |
        ssh -i "~/.ssh/public_key.pem" ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
          cd ~
          source venv/bin/activate
          cd ~/deploy/Taro
          pip install -e .
          taro
        EOF

    # - name: Run deploy script on EC2
    #   run: |
    #     ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
    #       cd /home/${{ secrets.EC2_USER }}/app
    #       ./deploy.sh  # or whatever you want to run on EC2
    #     EOF