name: Deploy to EC2

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # - name: Checkout code
    #   uses: actions/checkout@v3

    - name: Set up SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_KEY }}" > ~/.ssh/public_key.pem
        chmod 400 ~/.ssh/public_key.pem
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    # - name: Set up SSH key
    #   run: |
    #     echo "${{ secrets.EC2_HOST }}" |cut -c1-5

    - name: Upload code to EC2
      run: |
        ssh -i "~/.ssh/public_key.pem" ec2-user@{{ secrets.EC2_HOST }} "cd ~ && touch hi.txt"
